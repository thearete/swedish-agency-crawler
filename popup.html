<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Swedish Agency Crawler</h1>
    <p class="subtitle">Find international cooperation contacts at Swedish government agencies</p>

    <div class="controls">
      <button id="startBtn" class="btn btn-primary">Start Crawl</button>
      <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
      <button id="exportBtn" class="btn btn-secondary" disabled>Export CSV</button>
    </div>

    <div id="progressSection" class="progress-section hidden">
      <div class="progress-bar-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <p id="progressText" class="progress-text">Initializing...</p>
    </div>

    <div id="statusLog" class="status-log"></div>

    <div id="resultsSection" class="results-section hidden">
      <h2>Results (<span id="resultCount">0</span>)</h2>
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Agency</th>
            <th>Contact / Function</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Source</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
